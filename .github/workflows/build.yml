name: SimonAI Android CI

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-binary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            zeroclaw/target
          key: ${{ runner.os }}-cargo-android-full-${{ hashFiles('zeroclaw/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-android-full-
            ${{ runner.os }}-cargo-android-

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27

      - name: Configure Cargo for NDK
        run: |
          NDK="${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin"
          mkdir -p ~/.cargo
          cat > ~/.cargo/config.toml << EOF
          [target.aarch64-linux-android]
          linker = "${NDK}/aarch64-linux-android21-clang"
          rustflags = ["-C", "link-arg=-ldl"]
          EOF

      - name: Build zeroclaw (full — agent runtime, gateway, channels)
        working-directory: ./zeroclaw
        env:
          CC_aarch64_linux_android: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang
          AR_aarch64_linux_android: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar
          CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang
          PKG_CONFIG_ALLOW_CROSS: "1"
          OPENSSL_NO_VENDOR: "1"
          SQLITE_BUNDLED: "1"
        run: |
          cargo build --target aarch64-linux-android --release \
            --features "agent-runtime,gateway,default-channels,channel-telegram,channel-discord,channel-webhook" 2>&1

      - name: Upload binary
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: zeroclaw-aarch64-android
          path: zeroclaw/target/aarch64-linux-android/release/zeroclaw

  build-apk:
    needs: build-binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: zeroclaw-aarch64-android
          path: app/src/main/assets

      - name: Place binary in jniLibs
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          mv app/src/main/assets/zeroclaw app/src/main/jniLibs/arm64-v8a/libzeroclaw.so 2>/dev/null || \
          mv app/src/main/assets/libzeroclaw.so app/src/main/jniLibs/arm64-v8a/libzeroclaw.so 2>/dev/null || true
          ls -lh app/src/main/jniLibs/arm64-v8a/

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.5

      - name: Accept SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Build debug APK
        run: gradle wrapper --gradle-version 8.5 && ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: zeroclaw-android-apk
          path: app/build/outputs/apk/debug/*.apk
