name: Build ZeroClaw Android

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-binary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27

      - name: Configure Cargo for NDK
        run: |
          mkdir -p ~/.cargo
          NDK=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin
          cat >> ~/.cargo/config.toml << EOF
          [target.aarch64-linux-android]
          linker = "$NDK/aarch64-linux-android21-clang"
          EOF
          export CC_aarch64_linux_android="$NDK/aarch64-linux-android21-clang"
          export AR_aarch64_linux_android="$NDK/llvm-ar"

      - name: Build zeroclaw kernel (minimal)
        working-directory: ./zeroclaw
        run: |
          cargo build --target aarch64-linux-android --release --no-default-features 2>&1
          ls -lh target/aarch64-linux-android/release/zeroclaw || echo "Binary not found"

      - name: Upload binary
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: zeroclaw-aarch64-android
          path: zeroclaw/target/aarch64-linux-android/release/zeroclaw
