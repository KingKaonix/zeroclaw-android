name: Build ZeroClaw Android

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-binary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27

      - name: Configure Cargo for NDK
        run: |
          NDK="${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin"
          mkdir -p ~/.cargo
          cat > ~/.cargo/config.toml << EOF
          [target.aarch64-linux-android]
          linker = "${NDK}/aarch64-linux-android21-clang"
          EOF

      - name: Build zeroclaw kernel (minimal)
        working-directory: ./zeroclaw
        env:
          CC_aarch64_linux_android: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang
          AR_aarch64_linux_android: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar
          CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang
        run: |
          cargo build --target aarch64-linux-android --release --no-default-features 2>&1

      - name: Upload binary
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: zeroclaw-aarch64-android
          path: zeroclaw/target/aarch64-linux-android/release/zeroclaw

  build-apk:
    if: success()
    needs: build-binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: zeroclaw-aarch64-android
          path: app/src/main/assets

      - name: Rename binary
        run: |
          mv app/src/main/assets/zeroclaw app/src/main/assets/libzeroclaw.so
          chmod +x app/src/main/assets/libzeroclaw.so

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle + generate wrapper
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.5

      - name: Accept SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Build APK
        run: gradle wrapper && ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: zeroclaw-android-apk
          path: app/build/outputs/apk/release/*.apk
