name: Build ZeroClaw Android

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27

      - name: Configure Cargo for NDK
        run: |
          mkdir -p ~/.cargo
          cat >> ~/.cargo/config.toml << 'EOF'
          [target.aarch64-linux-android]
          linker = "$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang"
          EOF

      - name: Build zeroclaw for Android
        working-directory: ./zeroclaw
        run: |
          cargo build --target aarch64-linux-android --release \
            --no-default-features \
            --features "agent-runtime,gateway,memory-sqlite,tool-shell,tool-http,rustls"

      - name: Copy binary to assets
        run: |
          mkdir -p app/src/main/assets
          cp zeroclaw/target/aarch64-linux-android/release/zeroclaw app/src/main/assets/libzeroclaw.so

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up local.properties
        run: |
          echo "sdk.dir=\$ANDROID_HOME" > local.properties
          echo "ndk.dir=\$ANDROID_NDK_HOME" >> local.properties

      - name: Accept SDK licenses
        run: yes | \$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: zeroclaw-android-apk
          path: app/build/outputs/apk/release/*.apk
