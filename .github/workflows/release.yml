name: SimonAI Android Release

on:
  push:
    tags: ['v*', 'simonai-v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r27

      - name: Configure Cargo for NDK
        run: |
          NDK="${{ steps.ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin"
          mkdir -p ~/.cargo
          cat > ~/.cargo/config.toml <<EOF
          [target.aarch64-linux-android]
          linker = "${NDK}/aarch64-linux-android21-clang"
          rustflags = ["-C", "link-arg=-ldl"]
          EOF

      - name: Build SimonAI binary (full runtime)
        working-directory: ./zeroclaw
        env:
          PKG_CONFIG_ALLOW_CROSS: "1"
          CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER: ${{ steps.ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang
          CC_aarch64_linux_android: ${{ steps.ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang
          AR_aarch64_linux_android: ${{ steps.ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar
          OPENSSL_NO_VENDOR: "1"
          SQLITE_BUNDLED: "1"
        run: |
          cargo build --target aarch64-linux-android --release \
            --features "agent-runtime,gateway,default-channels,channel-telegram,channel-discord,channel-webhook"

      - name: Copy binary into jniLibs
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          cp zeroclaw/target/aarch64-linux-android/release/zeroclaw \
             app/src/main/jniLibs/arm64-v8a/libzeroclaw.so

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Accept SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Build release APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Sign APK
        id: sign
        run: |
          if [ -n "${{ secrets.SIMONAI_KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.SIMONAI_KEYSTORE_BASE64 }}" | base64 -d > ks.jks
            $ANDROID_HOME/build-tools/34.0.0/apksigner sign --ks ks.jks \
              --ks-pass pass:${{ secrets.SIMONAI_KEYSTORE_PASSWORD }} \
              --key-pass pass:${{ secrets.SIMONAI_KEY_PASSWORD }} \
              --ks-key-alias ${{ secrets.SIMONAI_KEY_ALIAS }} \
              --out simonai-signed.apk \
              app/build/outputs/apk/release/app-release-unsigned.apk
            echo "apk=simonai-signed.apk" >> $GITHUB_OUTPUT
          else
            echo "apk=app/build/outputs/apk/release/app-release-unsigned.apk" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.sign.outputs.apk }}
            zeroclaw/target/aarch64-linux-android/release/zeroclaw
          generate_release_notes: true
          body: |
            ## SimonAI for Android

            Full AI agent runtime — Rust-core, foreground service, 28+ LLM providers.

            ### Install
            ```bash
            adb install -r simonai-signed.apk   # signed
            adb install -r app-release-unsigned.apk  # unsigned
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}