name: SimonAI Android CI

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Accept SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Build debug APK
        run: |
          gradle wrapper --gradle-version 8.7
          set -o pipefail
          ./gradlew clean assembleDebug --no-daemon --stacktrace 2>&1 | tee ./gradle_build.log | tail -50

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: ./gradle_build.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: zeroclaw-android-apk
          path: app/build/outputs/apk/debug/*.apk
